<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoCar Admin Panel</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="admin-root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#9CA3AF;">Memuat Admin Panel...</div>
  </div>
  <script>
    window.addEventListener('error', function(e) {
      var root = document.getElementById('admin-root');
      var isLoading = root && root.innerText.indexOf('Memuat') !== -1;
      if (isLoading || !root.children.length) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:sans-serif;padding:24px;text-align:center;">' +
          '<div style="font-size:2.5rem;">⚠️</div>' +
          '<h2 style="margin:0;">Admin Panel gagal dimuat</h2>' +
          '<p style="color:#6B7280;max-width:480px;font-size:0.9rem;">' + (e.message || 'Script gagal dimuat') + '</p>' +
          '<p style="color:#9CA3AF;font-size:0.8rem;">Coba refresh (Ctrl+Shift+R) atau cek Console (F12).</p></div>';
      }
    }, true);
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/babel" data-presets="env,react" src="admin.js"></script>
</body>
</html>
