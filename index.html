<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoCar Indonesia – One Stop Car Shopping</title>
  <meta name="description" content="AutoCar Indonesia – Temukan mobil impian Anda dari berbagai brand terbaik dunia. Geely, BYD, dan lebih banyak lagi. One stop shopping mobil terpercaya di Indonesia." />
  <meta name="keywords" content="beli mobil, Geely Indonesia, BYD Indonesia, mobil listrik, dealer mobil, one stop shopping mobil" />
  <meta property="og:title" content="AutoCar Indonesia – One Stop Car Shopping" />
  <meta property="og:description" content="Temukan mobil impian Anda dari brand terbaik dunia di satu tempat." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#9CA3AF;">Memuat AutoCar...</div>
  </div>
  <script>
    // Tampilkan error di layar (bukan blank putih) jika ada script yang gagal
    window.addEventListener('error', function(e) {
      var root = document.getElementById('root');
      var isLoading = root && root.innerText.indexOf('Memuat') !== -1;
      if (isLoading || !root.children.length) {
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:sans-serif;padding:24px;text-align:center;">' +
          '<div style="font-size:2.5rem;">⚠️</div>' +
          '<h2 style="color:#0A0E1A;margin:0;">Terjadi kesalahan saat memuat website</h2>' +
          '<p style="color:#6B7280;max-width:480px;font-size:0.9rem;">' + (e.message || 'Script gagal dimuat') + '</p>' +
          '<p style="color:#9CA3AF;font-size:0.8rem;">Coba refresh halaman (Ctrl+Shift+R). Jika masih error, cek Console browser (F12).</p>' +
          '</div>';
      }
    }, true);
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="text/babel" data-presets="env,react" src="app.js"></script>
</body>
</html>
